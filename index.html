<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Team — Science Spark</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.dept-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
.dept-tab {
  padding: 8px 18px; border-radius: 8px;
  border: 1.5px solid var(--border); background: #fff;
  color: var(--grey); font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .2s; letter-spacing: .2px;
}
.dept-tab:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
.dept-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }

.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
.team-card {
  background: #fff; border-radius: 14px; padding: 28px 20px; text-align: center;
  border: 1px solid var(--border); transition: all .3s; position: relative; overflow: hidden;
}
.team-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--blue-mid), var(--sky)); transform: scaleX(0); transition: transform .3s; }
.team-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(13,42,78,.12); border-color: rgba(37,99,176,.15); }
.team-card:hover::after { transform: scaleX(1); }
.team-avatar {
  width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--blue-mid));
  margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #fff; letter-spacing: 1px;
  border: 4px solid #fff; box-shadow: 0 4px 20px rgba(13,42,78,.2);
  overflow: hidden; flex-shrink: 0;
}
.team-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 15%;
  display: block;
}
.team-avatar-OLD {
  width: 78px; height: 78px; border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--blue-mid));
  margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; letter-spacing: 1px;
  border: 3px solid #fff; box-shadow: 0 4px 16px rgba(13,42,78,.18);
}
.team-name { font-weight: 700; font-size: 15px; color: var(--navy); margin-bottom: 4px; }
.team-role { font-size: 12px; color: var(--sky); font-weight: 600; margin-bottom: 3px; }
.team-dept-tag { display: inline-block; background: var(--light); color: var(--blue-mid); border-radius: 100px; padding: 2px 10px; font-size: 11px; font-weight: 600; margin-bottom: 14px; }
.team-socials { display: flex; justify-content: center; gap: 8px; }
.team-social { width: 32px; height: 32px; border-radius: 8px; background: var(--cream); display: flex; align-items: center; justify-content: center; transition: all .2s; }
.team-social:hover { background: var(--blue-mid); }
.team-social:hover svg { fill: #fff; }
.team-social svg { width: 15px; height: 15px; fill: var(--navy); transition: fill .2s; }
.team-social .ig-icon { fill: none; stroke: var(--navy); stroke-width: 2; transition: stroke .2s; }
.team-social:hover .ig-icon { stroke: #fff; }

.dept-section { margin-bottom: 56px; }
.dept-heading { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--navy); letter-spacing: 1.5px; padding: 14px 20px; background: var(--light); border-left: 4px solid var(--blue-mid); border-radius: 0 8px 8px 0; margin-bottom: 24px; }

.no-results { text-align: center; padding: 60px 20px; color: var(--grey); font-size: 15px; }
</style>
</head>
<body>
<div id="main-nav"></div>

    <div class="breadcrumb"><a href="../index.html">Home</a> / Our Team</div>

  </div>
</div>

</div>

  {name:'Fahim Rahman',role:'Senior Vice President',dept:'Leadership',photo:'Fahim_Rahman_Senior_VP.jpeg',fb:null,insta:'https://www.instagram.com/fahim_d._rahman'},

  {name:'Partha Dev Nath',role:'President',dept:'Arts',photo:'Patha_Dev_Nath_President_Arts_and_Culture.jpeg',fb:'https://www.facebook.com/share/1CgejsEqbf/',insta:'https://www.instagram.com/partha_dhruba'},
  {name:'Arisha Rahman',role:'Secretary',dept:'Arts',photo:null,fb:'https://www.facebook.com/profile.php?id=61577868899761',insta:'https://www.instagram.com/_finding_arisha'},
  {name:'Tanvir Ahmed',role:'President',dept:'IT',photo:'Tanvir_Ahamed_President_IT.jpeg',fb:'https://www.facebook.com/share/1Dz9gzPMKo/',insta:'https://www.instagram.com/_krypton_199'},
  {name:'Tahsin Khan',role:'Vice President',dept:'IT',photo:'Tahsin_Khan_VP_Information_Technology.jpeg',fb:'https://www.facebook.com/share/18mZ5QcvW3/',insta:'https://www.instagram.com/cedrx_tahsu'},
  {name:'Mahadi Mokbul Ali',role:'Secretary',dept:'IT',photo:'Secretary___IT_.jpeg',fb:'https://www.facebook.com/share/1DHRyBE2ju/',insta:'https://www.instagram.com/mahadimokbulali'},
  {name:'Al Muktadir Mahin',role:'President',dept:'PR',photo:'President__PR_.jpeg',fb:'https://www.facebook.com/share/1Bn3tpDVXu/',insta:'https://www.instagram.com/mahinalmuktadir'},
];

const DEPT_LABELS = {
  JointSec:'Joint Secretary',
  Leadership:'Leadership',
  Management:'Management',
  Administration:'Administration',
  Publication:'Publication',
  LWS:'LWS',
  Photography:'Photography',
  Research:'Research & Development',
  Project:'Project',
  Concept:'Concept & Planning',
  Arts:'Arts & Culture',
  IT:'IT Department',
  PR:'Public Relations'
};

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}

function memberCard(m){
  const fbBtn = m.fb ? `<a href="${m.fb}" target="_blank" class="team-social" title="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>` : '';
  const igBtn = m.insta ? `<a href="${m.insta}" target="_blank" class="team-social" title="Instagram"><svg viewBox="0 0 24 24"><rect class="ig-icon" x="2" y="2" width="20" height="20" rx="5"/><circle class="ig-icon" cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="var(--navy)"/></svg></a>` : '';
  const avatar = m.photo
    ? `<div class="team-avatar"><img src="../images/${m.photo}" alt="${m.name}"></div>`
    : `<div class="team-avatar">${initials(m.name)}</div>`;
  return `<div class="team-card">
    ${avatar}
    <div class="team-name">${m.name}</div>
    <div class="team-role">${m.role}</div>
    <div class="team-dept-tag">${DEPT_LABELS[m.dept]||m.dept}</div>
    <div class="team-socials">${fbBtn}${igBtn}</div>
  </div>`;
}

function render(dept){
  const container = document.getElementById('teamContainer');
  if(dept === 'all'){
    const depts = [...new Set(MEMBERS.map(m=>m.dept))];
    container.innerHTML = depts.map(d=>`
      <div class="dept-section">
        <div class="dept-heading">${DEPT_LABELS[d]||d}</div>
        <div class="team-grid">${MEMBERS.filter(m=>m.dept===d).map(memberCard).join('')}</div>
      </div>`).join('');
  } else {
    const filtered = MEMBERS.filter(m=>m.dept===dept);
    container.innerHTML = `<div class="team-grid">${filtered.map(memberCard).join('')}</div>`;
  }
}

// Init from URL param
const urlDept = new URLSearchParams(window.location.search).get('dept') || 'all';
document.addEventListener('DOMContentLoaded', ()=>{
  render(urlDept);
  document.querySelectorAll('.dept-tab').forEach(btn=>{
    if(btn.dataset.dept === urlDept) { btn.classList.add('active'); } else { btn.classList.remove('active'); }
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.dept-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.dept);
    });
  });
});
</script>
</body>
</html>
